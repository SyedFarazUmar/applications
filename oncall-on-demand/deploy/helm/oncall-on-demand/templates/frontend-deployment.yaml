apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oncall.fullname" . }}-frontend
  namespace: {{ include "oncall.namespace" . }}
  labels:
    {{- include "oncall.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "oncall.selectorLabels" (dict "name" "frontend" "release" .Release.Name) | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "oncall.labels" . | nindent 8 }}
        {{- include "oncall.selectorLabels" (dict "name" "frontend" "release" .Release.Name) | nindent 8 }}
    spec:
      serviceAccountName: {{ include "oncall.serviceAccountName" . }}
      {{- include "oncall.imagePullSecrets" . | nindent 6 }}
      initContainers:
        - name: wait-for-mongodb
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for MongoDB at mongodb:{{ .Values.mongodb.service.port }}..."
              until nc -z mongodb {{ .Values.mongodb.service.port }}; do
                echo "MongoDB not ready — sleeping 3s"
                sleep 3
              done
              echo "MongoDB is reachable"
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.frontend.service.targetPort }}
              protocol: TCP
          env:
            - name: MONGO_URI
              value: {{ .Values.global.mongodb.uri | quote }}
            - name: DB_NAME
              value: {{ .Values.global.mongodb.dbName | quote }}
            - name: CALCULATOR_URL
              value: "http://calculator:{{ .Values.calculator.service.port }}"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "oncall.fullname" . }}-secrets
                  key: flask-secret-key
            - name: FLASK_DEBUG
              value: {{ .Values.frontend.env.flaskDebug | quote }}
          resources:
            {{- toYaml .Values.frontend.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
      {{- with .Values.frontend.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.frontend.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
