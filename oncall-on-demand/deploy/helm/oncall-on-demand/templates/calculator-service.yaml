apiVersion: v1
kind: Service
metadata:
  name: calculator
  namespace: {{ include "oncall.namespace" . }}
  labels:
    {{- include "oncall.labels" . | nindent 4 }}
    app.kubernetes.io/component: calculator
spec:
  type: {{ .Values.calculator.service.type }}
  ports:
    - port: {{ .Values.calculator.service.port }}
      targetPort: {{ .Values.calculator.service.targetPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "oncall.selectorLabels" (dict "name" "calculator" "release" .Release.Name) | nindent 4 }}
