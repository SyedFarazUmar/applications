{% extends "base.html" %}
{% block title %}Register — OnCall On-Demand{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body p-4">
                <h3 class="card-title text-center mb-4">
                    <i class="bi bi-person-plus-fill text-primary me-2"></i>Create Account
                </h3>
                <form method="POST" action="{{ url_for('register') }}">
                    <table class="table table-borderless mb-0">
                        <tbody>
                            <tr>
                                <td class="ps-0 pe-3 py-3 text-end" style="width:35%">
                                    <label for="username" class="form-label mb-0">Username</label>
                                </td>
                                <td class="ps-3 pe-0 py-3">
                                    <input type="text" class="form-control" id="username"
                                           name="username" placeholder="Choose a username" required>
                                </td>
                            </tr>
                            <tr>
                                <td class="ps-0 pe-3 py-3 text-end">
                                    <label for="password" class="form-label mb-0">Password</label>
                                </td>
                                <td class="ps-3 pe-0 py-3">
                                    <input type="password" class="form-control" id="password"
                                           name="password" placeholder="Choose a password"
                                           minlength="6" required>
                                </td>
                            </tr>
                            <tr>
                                <td class="ps-0 pe-3 py-3 text-end">
                                    <label for="employee_id" class="form-label mb-0">Employee ID</label>
                                </td>
                                <td class="ps-3 pe-0 py-3">
                                    <input type="text" class="form-control" id="employee_id"
                                           name="employee_id" placeholder="Your employee ID" required>
                                </td>
                            </tr>
                            <tr>
                                <td class="py-3"></td>
                                <td class="ps-3 pe-0 py-3">
                                    <button type="submit" class="btn btn-primary btn-lg w-100">
                                        <i class="bi bi-person-check me-1"></i>Register
                                    </button>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </form>
                <hr>
                <p class="text-center mb-0">
                    Already have an account?
                    <a href="{{ url_for('login') }}">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
